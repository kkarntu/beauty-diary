name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Reusable env shared by every job
env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  # ─── 1. Format + lint ───────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  # ─── 2. TypeScript typecheck across all workspaces ──────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@beauty-diary/shared build
      - run: pnpm typecheck

  # ─── 3. Tests against real Postgres + LocalStack S3 ─────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: beauty
          POSTGRES_PASSWORD: beauty
          POSTGRES_DB: beauty_diary_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U beauty -d beauty_diary_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      localstack:
        image: localstack/localstack:3
        env:
          SERVICES: s3
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -fsS http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://beauty:beauty@localhost:5432/beauty_diary_test
      JWT_ACCESS_SECRET: test-access-secret-min-32-chars-long
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-long
      COOKIE_SECRET: test-cookie-secret-min-32-chars-long
      WEB_ORIGIN: http://localhost:23000
      S3_ENDPOINT: http://localhost:4566
      S3_REGION: us-east-1
      S3_BUCKET: beauty-diary-media
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_FORCE_PATH_STYLE: 'true'
      S3_PUBLIC_URL: http://localhost:4566/beauty-diary-media
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
      SMTP_USER: ''
      SMTP_PASS: ''
      MAIL_FROM: 'noreply@beauty-diary.test'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@beauty-diary/shared build
      - name: Create S3 bucket in LocalStack
        run: |
          aws --endpoint-url=http://localhost:4566 s3api create-bucket \
            --bucket beauty-diary-media \
            --region us-east-1
      - run: pnpm db:migrate
      - run: pnpm test

  # ─── 4. Production build of both apps ───────────────────
  build:
    name: Build apps
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_API_URL: http://localhost:23001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
