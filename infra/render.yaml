# Render Blueprint — provisions the API service.
# Web app deploys to Vercel (configured via dashboard, not here).
# Database is on Neon (external), referenced via env var.

services:
  - type: web
    name: beauty-diary-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: .
    # `--prod=false` forces devDependencies to install even though
    # NODE_ENV=production — we need @nestjs/cli (provides the `nest`
    # binary) to compile the app. The compiled output ships only what
    # NestJS bundles into dist/, so this doesn't bloat the runtime.
    buildCommand: |
      corepack enable && \
      pnpm install --frozen-lockfile --prod=false && \
      pnpm --filter=@beauty-diary/shared build && \
      pnpm --filter=@beauty-diary/api build
    # Free tier doesn't support `preDeployCommand`, so migrations run at
    # process start. They're idempotent — TypeORM skips already-applied
    # ones via the `migrations` ledger table.
    startCommand: pnpm --filter=@beauty-diary/api migration:run && pnpm --filter=@beauty-diary/api start:prod
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      # ─── Runtime ────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '10000'
      - key: NODE_VERSION
        value: '22'
      - key: WEB_ORIGIN
        sync: false # e.g. https://beauty-diary.vercel.app

      # ─── Database (Neon) ────────────────────────────
      - key: DATABASE_URL
        sync: false # postgres://user:pass@host/db?sslmode=require

      # ─── Auth ───────────────────────────────────────
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      # Empty so the cookie binds to the api's specific subdomain. Setting
      # it to onrender.com would make the cookie shared with every Render
      # service, which we don't want.
      - key: COOKIE_DOMAIN
        value: ''
      # Required for SameSite=None cross-site cookies (Vercel ↔ Render).
      - key: COOKIE_SECURE
        value: 'true'

      # ─── Mail (Gmail SMTP via App Password) ─────────
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: '465'
      - key: SMTP_SECURE
        value: 'true'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

      # ─── Object storage (Cloudflare R2) ─────────────
      - key: S3_ENDPOINT
        sync: false # https://<account>.r2.cloudflarestorage.com
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      # R2 uses virtual-host style URLs, not path-style.
      - key: S3_FORCE_PATH_STYLE
        value: 'false'
      - key: S3_PUBLIC_URL
        sync: false # https://pub-xxx.r2.dev or your custom domain
